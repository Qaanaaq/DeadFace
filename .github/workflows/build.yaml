name: Build DeadFace

on:
  push:
    branches: [ "main" ]
    tags:
      - v*
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip          
          # LOCKING TO YOUR WORKING LOCAL VERSION
          pip install pyinstaller==5.13.0  
          pip install mediapipe==0.10.14         
          pip install transforms3d
          pip install numpy==1.26.2
          # Install the rest from requirements
          if (Test-Path Dead_Marks/requirements.txt) { pip install -r Dead_Marks/requirements.txt }
        shell: bash

      - name: Build with PyInstaller
        # Added --clean to ensure no cache interference between runs
        run: pyinstaller --noconfirm --clean DeadFace.spec

      # --- PACKAGING ---
      # 'Fix Windows data layout' was REMOVED because PyInstaller 5.13 
      # puts data in the root by default, not in _internal.

      - name: Package zip (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r DeadFace_${{ matrix.label }}.zip DeadFace/

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell -Command "Compress-Archive -Path 'dist/DeadFace/*' -DestinationPath 'dist/DeadFace_${{ matrix.label }}.zip'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeadFace_${{ matrix.label }}
          path: dist/DeadFace_${{ matrix.label }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}